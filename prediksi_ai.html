<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ AI Hybrid Forecasting - Multi-Model JSON</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .ai-card { border: none; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); }
        .token-input { max-width: 300px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-xl-11">
            
            <!-- HEADER -->
            <div class="d-flex align-items-center justify-content-between mb-4 bg-dark text-white p-3 rounded-3 shadow-sm">
                <h4 class="mb-0 fw-bold"><i class="fa-solid fa-microchip text-warning me-2"></i> Hybrid Energy Forecasting System (JSON Source)</h4>
                <div class="d-flex align-items-center gap-2">
                    <input type="password" id="githubToken" class="form-control form-control-sm token-input" placeholder="Masukkan GitHub Token (ghp_...)" />
                    <button class="btn btn-sm btn-outline-light" onclick="window.close()">Tutup</button>
                </div>
            </div>

            <!-- UTAMA -->
            <div class="card ai-card bg-white p-4">
                <!-- PANEL KONTROL MODEL -->
                <div class="row align-items-center mb-4 border-bottom pb-3 g-3">
                    <div class="col-md-5">
                        <h5 class="fw-bold mb-1 text-secondary">Pilih Engine Pemodelan:</h5>
                        <small class="text-muted">Data dinamis dari folder data_tagihan/</small>
                    </div>
                    <div class="col-md-5">
                        <select id="selectModel" class="form-select fw-bold border-primary" onchange="prosesPemilihanModel()">
                            <optgroup label="📉 Model Statistik Lokal (Instan)">
                                <option value="holtwinters">1. Holt-Winters Seasonal (Rekomendasi Lokal)</option>
                                <option value="linear">2. Regresi Linear (Garis Tren Lurus)</option>
                            </optgroup>
                            <optgroup label="🤖 Cloud LLM AI Forecasting (Butuh GitHub Token)">
                                <option value="gpt-4o">3. OpenAI GPT-4o (Analisis Pola Kompleks)</option>
                                <option value="DeepSeek-R1">4. DeepSeek-R1 (Penalaran Logis)</option>
                                <option value="Llama-3.3">5. Llama-3.3 (Alternatif Open Source)</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="col-md-2 text-md-end text-start">
                        <div id="aiStatus" class="badge bg-secondary p-2 fs-6 w-100">Memuat Data...</div>
                    </div>
                </div>

                <!-- GRAFIK -->
                <div id="canvasContainer" style="height: 480px; position: relative;">
                    <canvas id="chartPrediksiAI"></canvas>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
// Variabel Global Data Riil (Akan diisi dari file JSON)
let dataKwhHistorisGlobal = Array(18).fill(0);
let chartInstance = null;

const masterPeriode = [
    { id: 0, label: "Jan 25", fileKeyword: "Januari_25" }, { id: 1, label: "Feb 25", fileKeyword: "Februari_25" },
    { id: 2, label: "Mar 25", fileKeyword: "Maret_25" }, { id: 3, label: "Apr 25", fileKeyword: "April_25" },
    { id: 4, label: "Mei 25", fileKeyword: "Mei_25" }, { id: 5, label: "Jun 25", fileKeyword: "Juni_25" },
    { id: 6, label: "Jul 25", fileKeyword: "Juli_25" }, { id: 7, label: "Agu 25", fileKeyword: "Agustus_25" },
    { id: 8, label: "Sep 25", fileKeyword: "September_25" }, { id: 9, label: "Okt 25", fileKeyword: "Oktober_25" },
    { id: 10, label: "Nov 25", fileKeyword: "November_25" }, { id: 11, label: "Des 25", fileKeyword: "Desember_25" },
    { id: 12, label: "Jan 26", fileKeyword: "Januari_26" }, { id: 13, label: "Feb 26", fileKeyword: "Februari_26" },
    { id: 14, label: "Mar 26", fileKeyword: "Maret_26" }, { id: 15, label: "Apr 26", fileKeyword: "April_26" },
    { id: 16, label: "Mei 26", fileKeyword: "Mei_26" }, { id: 17, label: "Jun 26", fileKeyword: "Juni_26" }
];

const targetPrediksi = [
    { id: 18, label: "Jul 26" }, { id: 19, label: "Agu 26" }, { id: 20, label: "Sep 26" }, { id: 21, label: "Okt 26" },
    { id: 22, label: "Nov 26" }, { id: 23, label: "Des 26" }, { id: 24, label: "Jan 27" }, { id: 25, label: "Feb 27" },
    { id: 26, label: "Mar 27" }, { id: 27, label: "Apr 27" }, { id: 28, label: "Mei 27" }, { id: 29, label: "Jun 27" }
];

document.addEventListener("DOMContentLoaded", function() {
    muatDanInisialisasiData();
});

// 📁 FUNGSI UNTUK MEMBACA FILE JSON SEPERTI SEBELUMNYA
async function muatDanInisialisasiData() {
    const daftarKampus = ["ktt", "lidah", "mus"];
    try {
        for (let p of masterPeriode) {
            for (let kampus of daftarKampus) {
                let namaFile = `${kampus}_${p.fileKeyword}.json`;
                const response = await fetch(`data_tagihan/${namaFile}`);
                if (!response.ok) continue;
                
                const dataJson = await response.json();
                dataJson.forEach(item => {
                    let lwbp = parseInt(item["kWh LWBP"]) || parseInt(item["LWBP"]) || 0;
                    let wbp = parseInt(item["kWh WBP"]) || parseInt(item["WBP"]) || 0;
                    dataKwhHistorisGlobal[p.id] += (lwbp + wbp);
                });
            }
        }
        perbaruiStatus("Status: Siap", "success");
        prosesPemilihanModel(); // Jalankan kalkulasi model pertama kali setelah data JSON siap
    } catch (error) {
        console.error("Gagal memuat struktur file JSON:", error);
        perbaruiStatus("Error Load JSON", "danger");
    }
}

function perbaruiStatus(teks, tipe) {
    const statusEl = document.getElementById("aiStatus");
    statusEl.innerText = teks;
    statusEl.className = `badge p-2 fs-6 w-100 bg-${tipe}`;
}

async function prosesPemilihanModel() {
    const modelDipilih = document.getElementById("selectModel").value;
    let hasilPrediksi = [];

    if (modelDipilih === "holtwinters") {
        perbaruiStatus("Status: Siap", "success");
        hasilPrediksi = hitungHoltWinters(dataKwhHistorisGlobal, 12);
        tampilkanGrafik(hasilPrediksi);
    } else if (modelDipilih === "linear") {
        perbaruiStatus("Status: Siap", "success");
        hasilPrediksi = hitungRegresiLinear(dataKwhHistorisGlobal, targetPrediksi.map(p => p.id));
        tampilkanGrafik(hasilPrediksi);
    } else {
        const token = document.getElementById("githubToken").value.trim();
        if (!token) {
            alert("⚠️ Harap masukkan GitHub Personal Access Token di kanan atas untuk memanggil AI Cloud!");
            document.getElementById("selectModel").value = "holtwinters";
            return;
        }
        
        perbaruiStatus("🤖 Menghitung via AI Cloud...", "warning");
        hasilPrediksi = await panggilGitHubModelsAPI(modelDipilih, token, dataKwhHistorisGlobal);
        
        if (hasilPrediksi && hasilPrediksi.length === 12) {
            perbaruiStatus("⚡ Selesai (AI Cloud)", "info");
            tampilkanGrafik(hasilPrediksi);
        } else {
            perbaruiStatus("❌ Gagal Terhubung", "danger");
            alert("Gagal memproses prediksi dari model AI. Pastikan token Anda benar.");
            document.getElementById("selectModel").value = "holtwinters";
            prosesPemilihanModel();
        }
    }
}

// 🌐 ENGINE CALLING API GITHUB MODELS
async function panggilGitHubModelsAPI(modelName, token, dataRiil) {
    let endpointModelId = "";
    if (modelName === "gpt-4o") endpointModelId = "gpt-4o";
    else if (modelName === "DeepSeek-R1") endpointModelId = "DeepSeek-R1";
    else if (modelName === "Llama-3.3") endpointModelId = "Llama-3.3-70B-Instruct";

    const apiUrl = "https://models.inference.ai.azure.com/chat/completions";
    
    const systemPrompt = `Anda adalah sistem data scientist spesialis energi listrik gedung universitas. 
Tugas Anda: Menganalisis tren data historis dan perulangan musiman (seasonality) tahunan. 
Lakukan peramalan logis, realistis (tidak flat garis lurus) untuk 12 langkah ke depan. 
Aturan Mutlak: Respon Anda HANYA berupa array JSON valid berisikan 12 angka integer tanpa teks penjelasan, markdown bungkusan kode, atau karakter lain. Contoh output: [43000,45000,41000,38000,42000,46000,47000,44000,42000,45000,49000,43000]`;

    const userPrompt = `Berikut data runtun waktu kWh listrik kampus selama 18 bulan terakhir (Januari 2025 s.d Juni 2026): ${JSON.stringify(dataRiil)}. Ramalkan untuk Juli 2026 s.d Juni 2027.`;

    try {
        const response = await fetch(apiUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({
                model: endpointModelId,
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: userPrompt }
                ],
                temperature: 0.2
            })
        });

        if (!response.ok) throw new Error("Jaringan bermasalah");
        
        const dataJson = await response.json();
        let teksBalasan = dataJson.choices[0].message.content.trim();
        
        teksBalasan = teksBalasan.replace(/```json/g, "").replace(/```/g, "").trim();
        return JSON.parse(teksBalasan);
    } catch (err) {
        console.error("Kesalahan API GitHub Models:", err);
        return null;
    }
}

// 📉 ALGORITMA LOKAL 1: Holt-Winters
function hitungHoltWinters(data, langkahKeDepan) {
    const p = 12; 
    if (data.length < p) return Array(langkahKeDepan).fill(data[data.length-1]);
    const alpha = 0.3, beta = 0.1, gamma = 0.4;
    let level = data[0], trend = 0, musiman = Array(p).fill(1);

    for(let i=0; i<p; i++) { if(data[i] && level) musiman[i] = data[i] / level; }
    for (let i = 0; i < data.length; i++) {
        let value = data[i] || level;
        let levelLama = level;
        let idxMusiman = i % p;
        level = alpha * (value / musiman[idxMusiman]) + (1 - alpha) * (levelLama + trend);
        trend = beta * (level - levelLama) + (1 - beta) * trend;
        musiman[idxMusiman] = gamma * (value / level) + (1 - gamma) * musiman[idxMusiman];
    }
    let output = [];
    for (let m = 1; m <= langkahKeDepan; m++) {
        let idxTargetMusiman = (data.length + m - 1) % p;
        output.push((level + m * trend) * musiman[idxTargetMusiman]);
    }
    return output;
}

// 📉 ALGORITMA LOKAL 2: Regresi Linear
function hitungRegresiLinear(data, xTarget) {
    let n = data.length;
    let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
    for(let i=0; i<n; i++) {
        sumX += i; sumY += data[i]; sumXY += i * data[i]; sumX2 += i * i;
    }
    let slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
    let intercept = (sumY - slope * sumX) / n;
    return xTarget.map(tx => slope * tx + intercept);
}

// RENDER GRAFIK CHART.JS
function tampilkanGrafik(dataPrediksi) {
    const ctx = document.getElementById('chartPrediksiAI').getContext('2d');
    if (chartInstance) chartInstance.destroy();

    const semuaLabelSumbuX = [...masterPeriode.map(p => p.label), ...targetPrediksi.map(p => p.label)];
    const datasetRiil = [...dataKwhHistorisGlobal, ...Array(12).fill(null)];
    
    const datasetPrediksi = Array(17).fill(null);
    datasetPrediksi.push(dataKwhHistorisGlobal[17]); 
    dataPrediksi.forEach(nilai => datasetPrediksi.push(Math.round(nilai)));

    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            labels: semuaLabelSumbuX,
            datasets: [
                {
                    label: '📊 Data Riil Historis (JSON)',
                    data: datasetRiil,
                    borderColor: '#1e3c72',
                    backgroundColor: 'rgba(30, 60, 114, 0.08)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.1
                },
                {
                    label: '🔮 Hasil Proyeksi Model',
                    data: datasetPrediksi,
                    borderColor: '#dc3545',
                    backgroundColor: 'transparent',
                    borderWidth: 3,
                    borderDash: [6, 4],
                    pointBackgroundColor: '#dc3545',
                    tension: 0.2
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'top' } },
            scales: {
                y: { ticks: { callback: v => v.toLocaleString('id-ID') + ' kWh' } }
            }
        }
    });
}
</script>
</body>
</html>
