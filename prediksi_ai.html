<script>
document.addEventListener("DOMContentLoaded", function() {
    inisialisasiPrediksiAI();
});

async function inisialisasiPrediksiAI() {
    const statusEl = document.getElementById('aiStatus');
    const daftarKampus = ["ktt", "lidah", "mus"];

    const masterPeriode = [
        { id: 0, label: "Jan 25", fileKeyword: "Januari_25" },
        { id: 1, label: "Feb 25", fileKeyword: "Februari_25" },
        { id: 2, label: "Mar 25", fileKeyword: "Maret_25" },
        { id: 3, label: "Apr 25", fileKeyword: "April_25" },
        { id: 4, label: "Mei 25", fileKeyword: "Mei_25" },
        { id: 5, label: "Jun 25", fileKeyword: "Juni_25" },
        { id: 6, label: "Jul 25", fileKeyword: "Juli_25" },
        { id: 7, label: "Agu 25", fileKeyword: "Agustus_25" },
        { id: 8, label: "Sep 25", fileKeyword: "September_25" },
        { id: 9, label: "Okt 25", fileKeyword: "Oktober_25" },
        { id: 10, label: "Nov 25", fileKeyword: "November_25" },
        { id: 11, label: "Des 25", fileKeyword: "Desember_25" },
        { id: 12, label: "Jan 26", fileKeyword: "Januari_26" },
        { id: 13, label: "Feb 26", fileKeyword: "Februari_26" },
        { id: 14, label: "Mar 26", fileKeyword: "Maret_26" },
        { id: 15, label: "Apr 26", fileKeyword: "April_26" },
        { id: 16, label: "Mei 26", fileKeyword: "Mei_26" },
        { id: 17, label: "Jun 26", fileKeyword: "Juni_26" }
    ];

    const targetPrediksi = [
        { id: 18, label: "Jul 26" }, { id: 19, label: "Agu 26" }, { id: 20, label: "Sep 26" },
        { id: 21, label: "Okt 26" }, { id: 22, label: "Nov 26" }, { id: 23, label: "Des 26" },
        { id: 24, label: "Jan 27" }, { id: 25, label: "Feb 27" }, { id: 26, label: "Mar 27" },
        { id: 27, label: "Apr 27" }, { id: 28, label: "Mei 27" }, { id: 29, label: "Jun 27" }
    ];

    let dataKwhHistoris = Array(18).fill(0);

    try {
        // 1. BACA DATA JSON
        for (let p of masterPeriode) {
            for (let kampus of daftarKampus) {
                let namaFile = `${kampus}_${p.fileKeyword}.json`;
                const response = await fetch(`data_tagihan/${namaFile}`);
                if (!response.ok) continue;
                
                const dataJson = await response.json();
                dataJson.forEach(item => {
                    let lwbp = parseInt(item["kWh LWBP"]) || parseInt(item["LWBP"]) || 0;
                    let wbp = parseInt(item["kWh WBP"]) || parseInt(item["WBP"]) || 0;
                    dataKwhHistoris[p.id] += (lwbp + wbp);
                });
            }
        }

        // Filter data jika ada bulan yang kosong/tidak terbaca di awal agar tidak merusak tren
        const xValid = [];
        const yValid = [];
        dataKwhHistoris.forEach((val, idx) => {
            if (val > 0) {
                xValid.push(idx);
                yValid.push(val);
            }
        });

        if (xValid.length === 0) {
            throw new Error("Semua data file JSON terbaca 0 kWh. Periksa penamaan file atau key di dalam JSON Anda.");
        }

        // 2. PEMODELAN MATEMATIS (Regresi Polinomial Derajat 2 / Tren Kurva)
        // Rumus ini menggantikan TensorFlow untuk menghindari masalah skala data jomplang (Vanishing Gradient)
        const hasilPrediksiArray = hitungTrenPolinomial(xValid, yValid, targetPrediksi.map(p => p.id));

        statusEl.className = "badge bg-success status-badge text-white";
        statusEl.innerHTML = "<i class='fa-solid fa-check me-1'></i> Model Tren Siap";

        // 3. RENDER GRAFIK
        tampilkanGrafikGabungan(masterPeriode, targetPrediksi, dataKwhHistoris, hasilPrediksiArray);

    } catch (error) {
        console.error(error);
        statusEl.className = "badge bg-danger status-badge text-white";
        statusEl.innerHTML = error.message || "Error Memproses Data";
    }
}

// Algoritma Matrix Least Squares untuk mendapatkan Kurva Tren Penggunaan Listrik
function hitungTrenPolinomial(x, y, xTarget) {
    let n = x.length;
    let sumX = 0, sumX2 = 0, sumX3 = 0, sumX4 = 0;
    let sumY = 0, sumXY = 0, sumX2Y = 0;

    for (let i = 0; i < n; i++) {
        let xi = x[i];
        let yi = y[i];
        let xi2 = xi * xi;

        sumX += xi;
        sumX2 += xi2;
        sumX3 += xi2 * xi;
        sumX4 += xi2 * xi2;
        sumY += yi;
        sumXY += xi * yi;
        sumX2Y += xi2 * yi;
    }

    // Penyelesaian persamaan linear matriks 3x3 (Metode Cramer Sederhana)
    let d = n * (sumX2 * sumX4 - sumX3 * sumX3) - sumX * (sumX * sumX4 - sumX3 * sumX2) + sumX2 * (sumX * sumX3 - sumX2 * sumX2);
    
    if (Math.abs(d) < 0.1) {
        // Fallback ke Linear biasa jika matriks gagal/singular
        let m = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
        let c = (sumY - m * sumX) / n;
        return xTarget.map(tx => m * tx + c);
    }

    let da = sumY * (sumX2 * sumX4 - sumX3 * sumX3) - sumX * (sumXY * sumX4 - sumX3 * sumX2Y) + sumX2 * (sumXY * sumX3 - sumX2Y * sumX2);
    let db = n * (sumXY * sumX4 - sumX2Y * sumX3) - sumY * (sumX * sumX4 - sumX3 * sumX2) + sumX2 * (sumX * sumX2Y - sumXY * sumX2);
    let dc = n * (sumX2 * sumX2Y - sumXY * sumX3) - sumX * (sumX * sumX2Y - sumX2 * sumXY) + sumY * (sumX * sumX3 - sumX2 * sumX2);

    let a = da / d; // Koefisien x^2
    let b = db / d; // Koefisien x
    let c = dc / d; // Konstanta intercept

    // Masukkan target bulan masa depan (18-29) ke dalam rumus kurva tren
    return xTarget.map(tx => (a * tx * tx) + (b * tx) + c);
}

function tampilkanGrafikGabungan(masterPeriode, targetPrediksi, dataRiil, dataPrediksi) {
    const ctx = document.getElementById('chartPrediksiAI').getContext('2d');
    
    const semuaLabelSumbuX = [...masterPeriode.map(p => p.label), ...targetPrediksi.map(p => p.label)];
    const datasetRiil = [...dataRiil, ...Array(12).fill(null)];
    
    const datasetPrediksi = Array(17).fill(null);
    datasetPrediksi.push(dataRiil[17]); 
    
    dataPrediksi.forEach(nilai => {
        datasetPrediksi.push(nilai < 0 ? 0 : Math.round(nilai)); // Mencegah nilai minus jika tren drop ekstrim
    });

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: semuaLabelSumbuX,
            datasets: [
                {
                    label: '📊 Data Historis Riil',
                    data: datasetRiil,
                    borderColor: '#1e3c72',
                    backgroundColor: 'rgba(30, 60, 114, 0.1)',
                    borderWidth: 3.5,
                    pointRadius: 4,
                    tension: 0.2,
                    fill: true
                },
                {
                    label: '🔮 Proyeksi Tren Statistik (1 Tahun Kedepan)',
                    data: datasetPrediksi,
                    borderColor: '#dc3545',
                    backgroundColor: 'transparent',
                    borderWidth: 3,
                    borderDash: [6, 6],
                    pointRadius: 5,
                    pointBackgroundColor: '#dc3545',
                    tension: 0.1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
                x: { grid: { display: false } },
                y: {
                    title: { display: true, text: 'Total Konsumsi Listrik (kWh)', font: { weight: 'bold' } },
                    ticks: { callback: function(value) { return value.toLocaleString('id-ID') + ' kWh'; } }
                }
            }
        }
    });
}
</script>
